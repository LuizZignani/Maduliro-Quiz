<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maduliro Quiz</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f6d2ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .quiz-container {
            background-color: #ffeefc;
            padding: 30px;
            border-radius: 10px;
            border-style: dotted;
            border-width: 2px;
            border-color: pink;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 450px;
        }

        .image {
            align-items: center;
            text-align: center;
            justify-content: center;
        }

        img {
            background-color: #ffeefc;
            border-radius: 10px;
            border-style: dotted;
            border-width: 2px;
            border-color: pink;
            image-resolution: inherit;
        }

        .question {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .options {
            list-style-type: none;
            padding: 0;
        }

        .options li {
            background: #f9f9f9;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .options li:hover {
            background: #e0e0e0;
        }

        .options li.selected {
            background: #ffd3f0;
            border-left: 5px solid #ff6aeb;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #ef41ff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #b3008c;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #result-container {
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="quiz-container" id="quiz-container">
        <div class="image" id="question-image">
        </div>
        <div class="question" id="question-text">Carregando pergunta...</div>
        <ul class="options" id="options-list"></ul>
        <button id="next-btn" disabled>Próxima pergunta</button>
    </div>

    <div class="quiz-container" id="result-container">
        <h2>Quiz completado!</h2>
        <div class="question" id="score-text"></div>
        <div class="happytext" id="happy-text"></div>
        <button onclick="restartQuiz()">Recomeçar</button>
    </div>

    <script>
        const quizData = [
            {
                image: "<img src='./img/img1.jpeg' width='50%' height='50%'>",
                question: "Qual o nome dos nossos filhos?",
                options: [
                    "Kushashu e Kurama",
                    "Karma e Kushashu",
                    "Kushashu e Kyuubi",
                    "Kurama e Shukaku"
                ],
                correct: 3
            },
            {
                image: "<img src='./img/img2.jpeg' width='50%' height='50%'>",
                question: "Qual a data do nosso namoro?",
                options: [
                    "03/05/2026",
                    "03/04/2026",
                    "03/03/2026",
                    "Toda eternidade, pois somos também de vidas passadas."
                ],
                correct: [1, 3]
            },
            {
                image: "<img src='./img/img3.jpeg' width='50%' height='50%'>",
                question: "Qual será a data do nosso noivado e casamento?",
                options: [
                    "Agora, os dois",
                    "Agora o noivado e amanhã o casamento",
                    "Qualquer dia que corresponda ao dia e mês do nosso namoro",
                    "Pra ontem"
                ],
                correct: [0, 1, 2, 3]
            },
            {
                image: "<img src='./img/img4.jpeg' width='50%' height='50%'>",
                question: "Quem ama mais?",
                options: [
                    "O Murilo",
                    "O Gabriel",
                    "A Maria",
                    "A Eduarda"
                ],
                correct: 0
            },
            {
                image: "<img src='./img/img5.jpeg' width='50%' height='50%'>",
                question: "Quem falou 'Eu te amo' primeiro?",
                options: [
                    "O Murilo",
                    "A Madu"
                ],
                correct: 0
            },
            {
                image: "<img src='./img/img6.jpeg' width='50%' height='50%'>",
                question: "Qual foi nosso primeiro encontro?",
                options: [
                    "Cinema",
                    "Starbucks",
                    "Cidade Baixa",
                    "Praça de Alimentação"
                ],
                correct: 0
            },
            {
                image: "<img src='./img/img7.jpeg' width='50%' height='50%'>",
                question: "Em ordem, quais foram os bichinhos que nós modelamos?",
                options: [
                    "Cogumelo, dinossauro e urso",
                    "Cogumelo, pato e urso",
                    "Pato, cogumelo e dinossauro",
                    "Cogumelo, pato e dinossauro"
                ],
                correct: 3
            },
            {
                image: "<img src='./img/img8.jpeg' width='50%' height='50%'>",
                question: "De onde vem a frase: 'Eu te amo mais do que uma pessoa poderia amar outra pessoa'",
                options: [
                    "Crepúsculo",
                    "A culpa é das estrelas",
                    "Harry Potter",
                    "Como se fosse a primeira vez"
                ],
                correct: 3
            },
            {
                image: "<img src='./img/img9.jpeg' width='50%' height='50%'>",
                question: "Se um de nós comenta que acabou de esquecer o que iria falar, a opção certa a se fazer é:",
                options: [
                    "Tentar ajudar a lembrar, como repetindo oq estava dizendo antes.",
                    "Somente esperar pra ver se o outro lembra.",
                    "Interromper a memória do outro e sugerir que era que nós amamos.",
                    "Nenhuma das alternativas"
                ],
                correct: 2
            },
            {
                image: "<img src='./img/img10.jpeg' width='50%' height='50%'>",
                question: "Qual a data prevista para nós amarmos",
                options: [
                    "Sempre",
                    "Todo sempre",
                    "O resto das nossas vidasSSS",
                    "Pra todo sempre e o resto da eternidade"
                ],
                correct: 3
            }
        ];

        let currentQuestionIdx = 0;
        let score = 0;
        let selectedAnswerIdx = null;

        const questionText = document.getElementById('question-text');
        const optionsList = document.getElementById('options-list');
        const nextBtn = document.getElementById('next-btn');
        const quizBox = document.getElementById('quiz-container');
        const resultBox = document.getElementById('result-container');
        const scoreText = document.getElementById('score-text');
        const happytexto = document.getElementById('happy-text');
        const imagem = document.getElementById('question-image');

        function loadQuestion() {
            const currentQuestion = quizData[currentQuestionIdx];
            imagem.innerHTML = currentQuestion.image;
            questionText.innerText = `${currentQuestionIdx + 1}. ${currentQuestion.question}`;
            optionsList.innerHTML = '';
            selectedAnswerIdx = null;
            nextBtn.disabled = true;

            currentQuestion.options.forEach((option, index) => {
                const li = document.createElement('li');
                li.innerText = option;
                li.onclick = () => selectOption(li, index);
                optionsList.appendChild(li);
            });
        }

        function selectOption(element, index) {
            const allOptions = optionsList.querySelectorAll('li');
            allOptions.forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');

            selectedAnswerIdx = index;
            nextBtn.disabled = false; // Enable "Next" button once an answer is picked
        }

        nextBtn.addEventListener('click', () => {
            const currentQuestion = quizData[currentQuestionIdx];
            const correctAnswers = Array.isArray(currentQuestion.correct)
                ? currentQuestion.correct
                : [currentQuestion.correct];

            if (correctAnswers.includes(selectedAnswerIdx)) {
                score++;
            }

            currentQuestionIdx++;

            if (currentQuestionIdx < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        });

        function textoPontuacao(pont) {
            if (pont == 10) {
                happytexto.innerText = `Vocês dois são um casal perfeito!`;
            }
            else if (pont >= 6) {
                happytexto.innerText = `Vocês estão próximos a perfeição de um casal!`;
            }
            else {
                happytexto.innerText = `Às vezes, é difícil lembrar de cada detalhe, mas sempre podemos lembrar novamente das memórias!`;
            }
        }

        function showResults() {
            quizBox.style.display = 'none';
            resultBox.style.display = 'block';
            scoreText.innerText = `Placar: ${score} de ${quizData.length}!`;
            textoPontuacao(score);
        }

        function restartQuiz() {
            currentQuestionIdx = 0;
            score = 0;
            resultBox.style.display = 'none';
            quizBox.style.display = 'block';
            loadQuestion();
        }

        function iddqd() {
            console.log("4,4,4,1,1,1,4,4,3,4");
        }

        window.onload = loadQuestion;
    </script>
</body>

</html>
